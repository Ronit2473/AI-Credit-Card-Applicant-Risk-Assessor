<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Credit Card Applicant Risk Assessor</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Smooth animated gradient background */
        .bg-animate {
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<!-- Vibrant Animated Gradient Background -->
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 bg-animate min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <!-- Glassmorphism Card -->
    <div class="max-w-3xl w-full bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-white/20">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-gray-900 to-slate-800 p-8 text-white text-center relative overflow-hidden">
            <!-- Decorative background blob -->
            <div class="absolute top-0 left-0 w-full h-full opacity-20 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-pink-500 via-transparent to-transparent"></div>
            
            <h1 class="text-3xl font-extrabold tracking-tight relative z-10">
                <i class="fa-solid fa-bolt text-yellow-400 mr-2"></i>AI Credit Card Applicant Risk Assessor
            </h1>
            <p class="text-slate-300 mt-2 text-sm font-medium relative z-10">Intelligent applicant profiling powered by LLMs</p>
        </div>

        <!-- Main Form -->
        <form id="predictionForm" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Total Income ($)</label>
                    <input type="number" id="Total_income" required min="0" step="0.01" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium" placeholder="e.g. 50000">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Income Type</label>
                    <select id="Income_type" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium">
                        <option value="Working">Working</option>
                        <option value="Commercial associate">Commercial associate</option>
                        <option value="Pensioner">Pensioner</option>
                        <option value="State servant">State servant</option>
                        <option value="Student">Student</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Age</label>
                    <input type="number" id="Age" required min="18" max="100" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium" placeholder="e.g. 35">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Gender</label>
                    <select id="Gender" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Years Employed</label>
                    <input type="number" id="Years_employed" required min="0" step="0.1" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium" placeholder="e.g. 5.5">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Currently Working?</label>
                    <select id="Is_Working" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Account Length (Years)</label>
                    <input type="number" id="Account_length" required min="0" max="50" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium" placeholder="e.g. 3">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">Family Size</label>
                    <input type="number" id="Num_family" required min="1" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium" placeholder="e.g. 2">
                </div>
            </div>

            <!-- Vibrant Gradient Button with Hover lift -->
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-500 hover:to-pink-400 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 flex justify-center items-center text-lg mt-4">
                <span id="btnText">Analyze Application</span>
                <i id="btnSpinner" class="fa-solid fa-circle-notch fa-spin ml-3 hidden"></i>
            </button>
        </form>

        <!-- Result Container -->
        <div id="resultContainer" class="hidden px-8 pb-8 fade-in">
            
            <!-- Dynamic Approval Box -->
            <div id="resultBox" class="rounded-2xl p-6 text-center border-2 transition-all shadow-sm">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white shadow-sm mb-3">
                    <i id="resultIcon" class="text-3xl"></i>
                </div>
                <h2 id="resultTitle" class="text-2xl font-extrabold tracking-tight"></h2>
                <p id="resultMessage" class="mt-1 font-medium text-opacity-90"></p>
            </div>

            <!-- Sleek AI Chatbot Assistant -->
            <div class="mt-8 flex items-start space-x-4">
                <div class="flex-shrink-0 relative">
                    <!-- Glowing Avatar -->
                    <div class="absolute inset-0 bg-fuchsia-500 rounded-full blur opacity-40 animate-pulse"></div>
                    <div class="relative w-12 h-12 rounded-full bg-gradient-to-tr from-indigo-600 to-fuchsia-500 flex items-center justify-center text-white shadow-lg border-2 border-white">
                        <i class="fa-solid fa-robot text-lg"></i>
                    </div>
                </div>
                <div class="bg-slate-50 rounded-2xl rounded-tl-none p-5 shadow-inner border border-slate-200 w-full relative">
                    <p class="text-xs font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-fuchsia-600 uppercase mb-2">AI Risk Assistant</p>
                    <p id="botExplanation" class="text-sm text-slate-700 leading-relaxed min-h-[40px] font-medium">
                        <!-- Bot text types here -->
                    </p>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultContainer = document.getElementById('resultContainer');
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            const botExplanation = document.getElementById('botExplanation');

            submitBtn.disabled = true;
            btnText.innerText = "Processing Data...";
            btnSpinner.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            botExplanation.innerHTML = "<span class='animate-pulse'>Analyzing profile parameters...</span>"; 

            const payload = {
                Gender: parseInt(document.getElementById('Gender').value),
                Total_income: parseFloat(document.getElementById('Total_income').value),
                Income_type: document.getElementById('Income_type').value,
                Num_family: parseInt(document.getElementById('Num_family').value),
                Account_length: parseInt(document.getElementById('Account_length').value),
                Age: parseInt(document.getElementById('Age').value),
                Years_employed: parseFloat(document.getElementById('Years_employed').value),
                Is_Working: parseInt(document.getElementById('Is_Working').value)
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) { throw new Error("API Error"); }

                const data = await response.json();

                resultContainer.classList.remove('hidden');
                
                // Vibrant Success/Danger Boxes
                if (data.risk === 'Low Risk User') {
                    resultBox.className = "rounded-2xl p-6 text-center border-2 border-emerald-400 bg-gradient-to-b from-emerald-50 to-white text-emerald-900 shadow-emerald-100 shadow-lg";
                    resultIcon.className = "fa-solid fa-check text-emerald-500 text-3xl";
                    resultTitle.innerText = "Approved / Low Risk";
                    resultMessage.innerText = "This profile meets all safe criteria for credit approval.";
                } else {
                    resultBox.className = "rounded-2xl p-6 text-center border-2 border-rose-400 bg-gradient-to-b from-rose-50 to-white text-rose-900 shadow-rose-100 shadow-lg";
                    resultIcon.className = "fa-solid fa-xmark text-rose-500 text-3xl";
                    resultTitle.innerText = "Declined / High Risk";
                    resultMessage.innerText = "This profile has been flagged as high risk for default.";
                }

                // Typewriter effect for the LLM Explanation
                botExplanation.innerText = ""; 
                let i = 0;
                const speed = 25; 
                const explanationText = data.explanation || "No explanation provided by the API.";
                
                function typeWriter() {
                    if (i < explanationText.length) {
                        botExplanation.innerHTML += explanationText.charAt(i);
                        i++;
                        setTimeout(typeWriter, speed);
                    }
                }
                
                typeWriter();

            } catch (error) {
                alert("Could not connect to the API. Make sure your FastAPI server is running on http://127.0.0.1:8000!");
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "Analyze Application";
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
